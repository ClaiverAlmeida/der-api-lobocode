# Nome do projeto Compose explícito: evita colisão com outros repos que usam docker-compose em docker/
name: der-api-lobocode-database

services:
  # Database PostgreSQL
  db:
    image: postgres:16.8-alpine3.20
    container_name: departamento-estadual-rodovias-db
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
    ports:
      - '3211:5432'
    volumes:
      - departamento-estadual-rodovias-api-lobocode_postgres_data:/var/lib/postgresql/data
      - ./postgres-entrypoint.sh:/usr/local/bin/postgres-entrypoint.sh:ro
    entrypoint: ['/bin/bash', '/usr/local/bin/postgres-entrypoint.sh']
    healthcheck:
      # Só fica healthy DEPOIS do entrypoint sincronizar a senha (evita backend conectar com senha errada)
      test:
        [
          'CMD-SHELL',
          'test -f /tmp/postgres-entrypoint-done && pg_isready -U ${DB_USER}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    # Recursos para ~50 usuários e bastante requisição diária (ajuste conforme monitoramento)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - app-net-departamento-estadual-rodovias

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: departamento-estadual-rodovias-redis
    ports:
      - '3911:6379'
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 128M
          cpus: '0.1'
    restart: unless-stopped
    networks:
      - app-net-departamento-estadual-rodovias

volumes:
  departamento-estadual-rodovias-api-lobocode_postgres_data:
    external: true
  redis_data:

networks:
  app-net-departamento-estadual-rodovias:
    external: true
