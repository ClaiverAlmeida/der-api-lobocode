services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: departamento-estadual-rodovias-nginx
    ports:
      - '18080:80' # departamento-estadual-rodovias: bloco 18xxx
      - '18443:443' # departamento-estadual-rodovias: bloco 18xxx
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/api.conf:/etc/nginx/api.conf:ro
      - ../ssl:/etc/nginx/ssl:ro
      - ../nginx/logs:/var/log/nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'
        reservations:
          memory: 64M
          cpus: '0.1'
    networks:
      - app-net-departamento-estadual-rodovias
networks:
  app-net-departamento-estadual-rodovias:
    external: true
