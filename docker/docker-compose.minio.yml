services:
  # MinIO - Armazenamento de Arquivos
  minio:
    image: minio/minio:latest
    container_name: departamento-estadual-rodovias-minio
    env_file:
      - .env
    ports:
      - '19000:9000' # departamento-estadual-rodovias: bloco 19xxx
      - '19001:9001' # departamento-estadual-rodovias: bloco 19xxx
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.3'
        reservations:
          memory: 256M
          cpus: '0.1'
    restart: unless-stopped
    networks:
      - app-net-departamento-estadual-rodovias

volumes:
  minio_data:

networks:
  app-net-departamento-estadual-rodovias:
    driver: bridge
