# Produção: apenas backend.
# Banco e Redis sobem por docker-compose.database.yml + scripts/start-database.sh
name: der-api-lobocode-prod

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: departamento-estadual-rodovias-backend
    env_file:
      - ../.env
    ports:
      - '3011:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@departamento-estadual-rodovias-db:5432/${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://departamento-estadual-rodovias-redis:6379
      - MINIO_HOST=departamento-estadual-rodovias-minio
      - MINIO_PORT=9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-password123}
      - MINIO_USE_SSL=false
      - MINIO_ENDPOINT=https://api.departamento-estadual-rodovias.com.br/files
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.2'
    networks:
      - app-net-departamento-estadual-rodovias

networks:
  app-net-departamento-estadual-rodovias:
    external: true
