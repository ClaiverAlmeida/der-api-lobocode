events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs (JSON format)
    log_format json_combined escape=json
        '{ "time":"$time_iso8601", '
        '"remote_addr":"$remote_addr", '
        '"request":"$request", '
        '"status":$status, '
        '"body_bytes_sent":$body_bytes_sent, '
        '"request_time":$request_time, '
        '"upstream_response_time":"$upstream_response_time", '
        '"http_referer":"$http_referer", '
        '"http_user_agent":"$http_user_agent" }';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline';" always;

    # HTTP server - Redireciona para HTTPS
    server {
        listen 80;
        server_name api.departamento-estadual-rodovias.com.br www.api.departamento-estadual-rodovias.com.br 31.97.166.94 localhost der-api.lobocode.com.br der-app.lobocode.com.br;
        return 301 https://$host$request_uri;
    }

    # HTTPS server - Frontend + Backend
    server {
        listen 443 ssl http2;
        server_name api.departamento-estadual-rodovias.com.br www.api.departamento-estadual-rodovias.com.br der-api.lobocode.com.br der-app.lobocode.com.br;

        # SSL configuration (Let's Encrypt ou auto-assinado)
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # WebSocket - Socket.IO (OTIMIZADO PARA MOBILE)
        location /socket.io/ {
            proxy_pass http://backend:3000/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_connect_timeout 60s;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-NginX-Proxy true;
            proxy_redirect off;
        }

        # Proxy para Backend API
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            
            proxy_pass http://backend:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # CORS headers
            add_header Access-Control-Allow-Origin "https://api.departamento-estadual-rodovias.com.br" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
            add_header Access-Control-Allow-Credentials "true" always;
            
            # Preflight OPTIONS request
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://api.departamento-estadual-rodovias.com.br" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
                add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Content-Type "text/plain charset=UTF-8";
                add_header Content-Length 0;
                return 204;
            }
            
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;

            # Error handling
            proxy_intercept_errors on;
            error_page 502 503 504 = @backend_down;
        }

        # Health check para o backend
        location /health {
            proxy_pass http://backend:3000/health;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            access_log off;
            proxy_intercept_errors on;
            error_page 502 503 504 = @health_down;
        }

        # Proxy para MinIO Files (via HTTPS)
        location /files/ {
            proxy_pass http://minio:9000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Headers para arquivos grandes
            proxy_buffering off;
            proxy_request_buffering off;
            client_max_body_size 100M;
            
            # Cache para arquivos
            proxy_cache_valid 200 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # Service Worker - DEVE vir antes da regra genérica do frontend
        location = /ngsw-worker.js {
            proxy_pass http://frontend:80/ngsw-worker.js;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Content-Type "application/javascript";
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            add_header Service-Worker-Allowed /;
            access_log off;
        }

        # Manifest do Service Worker
        location = /ngsw.json {
            proxy_pass http://frontend:80/ngsw.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Content-Type "application/json";
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            access_log off;
        }

        # Manifest PWA
        location = /manifest.json {
            proxy_pass http://frontend:80/manifest.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Content-Type "application/manifest+json";
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            access_log off;
        }

        # Assets estáticos (imagens, CSS, JS) - Cache longo
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 1d;
            add_header Cache-Control "public, max-age=86400";
            access_log off;
        }

        # Pasta assets específica
        location /assets/ {
            proxy_pass http://frontend:80/assets/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "public, max-age=86400";
            access_log off;
        }

        # Proxy para Frontend
        location / {
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_cache_bypass $http_upgrade;
            
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
        }
        
        # Backend down handler
        location @backend_down {
            return 502 '{"error": "Backend service temporarily unavailable", "status": 502}';
            add_header Content-Type application/json;
        }
        
        # Health check down handler
        location @health_down {
            return 503 '{"status": "unhealthy", "error": "Backend service unavailable"}';
            add_header Content-Type application/json;
        }
    }

    # Dominio API dedicado - DER
    server {
        listen 443 ssl http2;
        server_name der-api.lobocode.com.br;
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        location / {
            limit_req zone=api burst=60 nodelay;
            proxy_pass http://backend:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
        }
    }

    # Dominio APP dedicado - DER
    server {
        listen 443 ssl http2;
        server_name der-app.lobocode.com.br;
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        location / {
            # Hotfix: reescreve URL hardcoded do build atual sem rebuild do frontend.
            proxy_set_header Accept-Encoding "";
            sub_filter_once off;
            sub_filter_types application/javascript text/javascript;
            sub_filter 'http://localhost:3011' 'https://der-api.lobocode.com.br';
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
        }
    }
}
